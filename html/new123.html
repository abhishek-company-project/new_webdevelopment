    <style>
        *{
            margin: 0px;
            padding: 10px;
            box-sizing: border-box;
        }
        input:hover{
            color: red;
        }
        input:focus{
            color: green;
        }

        a:link{
            color: red;
        }

        a:visited{
            color: green;
        }

        a:active{
            color: blue;
        }

        h1{
            opacity: 0.1;
        }

        /* li:nth-child(odd){
            color: red;
        }
        li:nth-child(2n+1){

       li:last-child{
        color: red;
       }
       h1::first-letter{
        color: red;
        font-size: 150px;
        text-transform: uppercase;
       }

       h1::selection{
        background-color: green;
       }
       li::marker{
        color: blue;
        font-size: 25px;
       }
       
    </style>
