<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        .container{
            height: 100%;
            width: 100%;
        }
        .container video{
            height: 100%;
            width: 100%;
            object-fit: cover;
        }
        .cover-video{
            height: 100%;
            width: 100%;
            background:linear-gradient(90deg,#14132b90,#1D1C39) ;
            position: absolute;
            top: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .play{
            height: 120px;
            width: 120px;
            border-radius: 50%;
            background-color: #EE5EB9;
        }
    </style>
</head>
<body>
    <div class="container">
        <video autoplay loop muted>
            <source src="https://a.storyblok.com/f/99519/x/49dcfddd8e/the-brand-leader-video-thumbnail.mp4">
        </video>

        <div class="cover-video">
            <div class="play"></div>
        </div>
    </div>
    <script src="../javascript/loop.js"></script>
</body>
</html>
