<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        .navbar{
            height: 90px;
            width: 100%;
            background-color: rgb(15, 86, 110);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0px 80px;
            color: white;
        }
        .navbar .logo{
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .navbar .logo img{
            height: 50px;
            width: 50px;

        }
        .navbar ul{
            display: flex;
            gap: 25px;
            list-style: none;
        }
        .navbar button{
            padding: 8px 25px;
            border: 2px solid rgb(228, 228, 228);
            background-color: transparent;
            color: white;
            border-radius: 10px;
        }

        .hero-section{
            height: 650px;
            width: 100%;
            background-color: rgb(228, 239, 248);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .hero-section h1{
            font-size: 45px;
            width: 50%;
            text-align: center
        }
        .hero-section p{
            font-size: 20px;
            width: 40%;
            text-align: center
        }
        .hero-section button{
              padding: 8px 25px;
            border: 2px solid rgb(32, 24, 24);
            background-color: transparent;
            color: rgb(0, 0, 0);
            border-radius: 10px;
        }
        
    </style>
</head>
<body>
    
    <div class="navbar">
        <div class="logo">
            <img src="../Screenshot 2026-01-27 111552.png" alt="">
            <h1>Ngobati</h1>
        </div>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
            <li>Services</li>
            <li>Blogs</li>
        </ul>

        <button>Contact Us</button>
    </div>

    <div class="hero-section">
        <h1>Discover Patient-Centered Health Consultation Services Anytime, Anywhere</h1>
        <p>We are here to provide easily accessible, reliable, and innovative health solutions supported by technology and a team of experienced medical experts.</p>
        <button>Contact Us</button>
    </div>

</body>
</html>
