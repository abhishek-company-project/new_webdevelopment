<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            box-sizing: border-box;
            padding: 0px;
            margin: 0px;
        }

        .container {
            height: 250px;
            width: 350px;
            background-color: teal;
            color: rgb(255, 255, 255);
            padding: 15px;
            border-radius: 15px;
            margin: 50px;
        }

        /* desendent selector = space */
        .container h1 {
            margin-bottom: 15px;
        }
        .container p{
            color: rgb(185, 211, 203);
        }
        .container button {
            margin-top: 35px;
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            color: white;
            background-color: lightseagreen;
            outline: 2px solid lightseagreen;
            outline-offset: 3px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Hello user</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ex eveniet tenetur odio, animi deleniti distinctio
            sapiente? Minus reprehenderit quas, consequatur ex quasi eveniet aliquam error debitis cum officiis ducimus
            at!</p>
        <button>Register now</button>
    </div>

    <h3>asdfadf</h3>
</body>

</html>
