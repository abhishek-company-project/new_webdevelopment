<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Static Image Gallery</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .gallery {
            width: 80%;
            max-width: 900px;
        }

        /* Main Image Container */
        .main-image {
            position: relative;
            width: 100%;
            height: 400px;
            background: #ddd;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Arrows */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 50%;
            font-size: 18px;
            transition: 0.3s;
        }

        .arrow:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .arrow.left {
            left: 15px;
        }

        .arrow.right {
            right: 15px;
        }

        /* Thumbnails */
        .thumbnails {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .thumb {
            width: 100px;
            height: 70px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.3s;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb:hover {
            transform: scale(1.05);
            border-color: #007bff;
        }

        /* Active (static highlight example) */
        .thumb.active {
            border-color: #007bff;
        }
    </style>
</head>

<body>

    <div class="gallery">

        <!-- Main Image -->
        <div class="main-image">
            <button class="arrow left">&#10094;</button>

            <img src="https://picsum.photos/id/1015/200/150" alt="Main Image">

            <button class="arrow right">&#10095;</button>
        </div>

        <!-- Thumbnails -->
        <div class="thumbnails">
            <div class="thumb active" onclick="change(0)">
                <img src="https://picsum.photos/id/1015/200/150">
            </div>
            <div class="thumb"  onclick="change(1)">
                <img src="https://picsum.photos/id/1016/200/150">
            </div>
            <div class="thumb"  onclick="change(2)">
                <img src="https://picsum.photos/id/1018/200/150">
            </div>
            <div class="thumb"  onclick="change(3)">
                <img src="https://picsum.photos/id/1020/200/150">
            </div>
            <div class="thumb"  onclick="change(4)">
                <img src="https://picsum.photos/id/1024/200/150">
            </div>
        </div>

    </div>


    <script>
        var leftbtn = document.querySelector(".left")
        var rightbtn = document.querySelector(".right")

        var mainimage = document.querySelector(".main-image img")
        var mainimageurl = mainimage.getAttribute("src")
        console.log(mainimageurl)

        var alltumimages = document.querySelectorAll(".thumb img")
        console.log(alltumimages)

        var allurl = []

        for (var i = 0; i < alltumimages.length; i++) {
            allurl.push(alltumimages[i].getAttribute("src"))
        }
        console.log(allurl)
        var currentindex = allurl.indexOf(mainimageurl)
        console.log(currentindex)

        leftbtn.addEventListener("click", function () {
            console.log("left")
            currentindex--;
            console.log(currentindex)
            if (currentindex < 0) {
                currentindex = allurl.length - 1;
            }
            mainimage.setAttribute("src", allurl[currentindex])
        })

        rightbtn.addEventListener("click", function () {
            console.log("right")
            currentindex++;
            if (currentindex == allurl.length) {
                currentindex = 0;
            }
            mainimage.setAttribute("src", allurl[currentindex])
        })

        function change(index){
             mainimage.setAttribute("src", allurl[index])
        }

    </script>

</body>

</html>
